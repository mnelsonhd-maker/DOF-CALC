<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DOF Calc">
<meta name="theme-color" content="#050508">
<title>DOF Calculator — NelsonHD</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{height:100%;background:#050508;color:#fff;font-family:system-ui,-apple-system,sans-serif}
#app{max-width:480px;margin:0 auto;padding-bottom:40px}

/* Header */
.hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 12px;border-bottom:1px solid #1e1e2e}
.hdr-left{display:flex;align-items:center;gap:10px}
.logo-img{width:34px;height:34px;object-fit:contain;border-radius:4px}
.hdr-sub{font-family:monospace;font-size:9px;letter-spacing:3px;color:#555570;margin-bottom:1px}
.hdr-title{font-size:20px;font-weight:900;letter-spacing:1px;line-height:1}
.sensor-btn{font-family:monospace;font-size:11px;border:1px solid #38c8f5;color:#38c8f5;background:transparent;padding:5px 10px;border-radius:5px;font-weight:700}

/* Mode row */
.mode-row{display:flex;gap:8px;padding:14px 16px;border-bottom:1px solid #1e1e2e}
.mode-btn{flex:1;padding:11px 6px;border-radius:8px;font-size:13px;font-weight:700;border:1px solid #222232;background:#141420;color:#c8c8de}

/* Sections */
.sec{padding:14px 16px;border-bottom:1px solid #1e1e2e}
.lbl{font-family:monospace;font-size:10px;letter-spacing:3px;color:#555570;text-transform:uppercase;margin-bottom:10px}

/* Maker pills */
.maker-wrap{display:flex;flex-wrap:wrap;gap:7px}
.mkr{font-family:monospace;font-size:12px;font-weight:700;padding:9px 12px;border-radius:7px;border:1px solid #222232;background:#141420;color:#c8c8de}

/* Lens button */
.lens-btn{width:100%;background:#141420;border:1px solid #222232;color:#7878a0;font-size:14px;font-family:inherit;padding:13px 14px;border-radius:8px;text-align:left;display:flex;justify-content:space-between;align-items:center}
.lens-btn.sel{color:#fff;font-weight:600}

/* Zoom row */
.zoom-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.zoom-lbl{font-family:monospace;font-size:11px;color:#555570;min-width:36px}
.zoom-val{font-family:monospace;font-size:13px;font-weight:700;min-width:44px;text-align:right}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;outline:none;border:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;cursor:pointer}

/* F-stop grid */
.fstop-wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.fs{font-family:monospace;font-size:13px;font-weight:700;padding:12px 4px;border-radius:7px;border:1px solid #222232;background:#141420;color:#c8c8de}
.fs.on{color:#050508}

/* Inputs */
.dist-row{display:flex;gap:10px;align-items:center}
input[type=number]{background:#141420;border:1px solid #222232;color:#fff;font-family:inherit;font-size:16px;border-radius:8px;padding:12px 14px;outline:none;-webkit-appearance:none;appearance:none;width:100%}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.unit{font-family:monospace;font-size:13px;color:#c8c8de;font-weight:700;white-space:nowrap}
.sldr-labels{display:flex;justify-content:space-between;font-family:monospace;font-size:10px;color:#3a3a52;margin-top:3px}

/* Results */
.results{padding:16px 16px 40px}
.empty{text-align:center;padding:36px 20px;font-family:monospace;font-size:12px;color:#3a3a52}

.main-card{border:1px solid #222232;border-radius:10px;padding:16px;margin-bottom:10px;border-left-width:4px;background:#141420}
.card-lbl{font-family:monospace;font-size:10px;letter-spacing:2px;color:#555570;text-transform:uppercase;margin-bottom:6px}
.big-val{font-size:52px;font-weight:900;line-height:1;color:#fff}
.big-unit{font-family:monospace;font-size:17px;color:#c8c8de;margin-left:6px;font-weight:400}
.card-sub{font-family:monospace;font-size:11px;color:#555570;margin-top:6px}

.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.mini-card{background:#141420;border:1px solid #222232;border-radius:10px;padding:13px 14px}
.mini-val{font-size:28px;font-weight:800;color:#fff;line-height:1}
.mini-unit{font-family:monospace;font-size:12px;color:#c8c8de;margin-left:3px;font-weight:400}

.bar-lbl{font-family:monospace;font-size:10px;letter-spacing:2px;color:#555570;text-transform:uppercase;margin-bottom:6px}
.bar-track{height:8px;background:#0d0d14;border-radius:4px;position:relative;overflow:hidden;border:1px solid #1e1e2e;margin-bottom:4px}
.bar-fill{position:absolute;top:0;bottom:0;border-radius:4px}
.bar-ends{display:flex;justify-content:space-between;font-family:monospace;font-size:10px;color:#3a3a52;margin-bottom:10px}

.hyp-card{background:#0d0d14;border:1px solid #1e1e2e;border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hyp-lbl{font-family:monospace;font-size:10px;letter-spacing:2px;color:#555570;text-transform:uppercase;margin-bottom:3px}
.hyp-val{font-family:monospace;font-size:15px;color:#38c8f5;font-weight:700}
.tag{font-family:monospace;font-size:11px;padding:3px 9px;border-radius:4px;font-weight:700}
.spec{font-family:monospace;font-size:10px;color:#2a2a3e;margin-top:4px}

/* Reverse */
.rev-desc{font-family:monospace;font-size:11px;color:#7878a0;margin-bottom:14px;line-height:1.6}
.quick-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.qk{font-family:monospace;font-size:12px;font-weight:700;padding:7px 10px;border-radius:6px;border:1px solid #222232;background:#141420;color:#c8c8de}

.rev-card{border:4px solid #3ef59a;border-radius:10px;padding:18px 16px;margin-bottom:10px;background:#141420;border-left-width:4px}
.rev-val{font-size:52px;font-weight:900;line-height:1;color:#3ef59a}
.three-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}

/* Modals */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;align-items:flex-end}
.overlay.open{display:flex}
.modal-box{background:#111120;border:1px solid #222232;border-radius:18px 18px 0 0;width:100%;padding:22px 16px 34px;max-height:75vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-title{font-size:18px;font-weight:900;margin-bottom:14px}
.sens-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.sens-opt{background:#141420;border:1px solid #222232;border-radius:10px;padding:13px 12px;cursor:pointer;text-align:center}
.sens-opt.on{background:rgba(56,200,245,.15);border-color:#38c8f5}
.sens-name{font-size:13px;font-weight:700;margin-bottom:2px}
.sens-opt.on .sens-name{color:#38c8f5}
.sens-sub{font-family:monospace;font-size:11px;color:#555570}
.done-btn{width:100%;border:none;border-radius:10px;padding:14px;font-family:inherit;font-size:15px;font-weight:800;color:#050508}

.lens-modal{background:#111120;border:1px solid #222232;border-radius:18px 18px 0 0;width:100%;max-height:75vh;display:flex;flex-direction:column}
.lens-hdr{padding:18px 16px 10px;border-bottom:1px solid #1e1e2e;flex-shrink:0}
.lens-hdr h2{font-size:18px;font-weight:900}
.lens-hdr p{font-family:monospace;font-size:11px;color:#555570;margin-top:2px}
.lens-list{overflow-y:auto;flex:1;padding:8px 12px 10px;-webkit-overflow-scrolling:touch}
.lens-item{display:block;width:100%;text-align:left;background:transparent;border:1px solid transparent;border-radius:8px;padding:13px 12px;margin-bottom:4px;font-family:inherit}
.lens-item.on{border-width:1px}
.li-name{font-size:14px;font-weight:400;color:#fff}
.lens-item.on .li-name{font-weight:700}
.li-sub{font-family:monospace;font-size:11px;color:#555570;margin-top:2px}
.lens-ftr{padding:10px 16px 20px;border-top:1px solid #1e1e2e;flex-shrink:0}
.cancel-btn{width:100%;background:#141420;border:1px solid #222232;color:#c8c8de;font-family:inherit;font-size:15px;font-weight:700;padding:13px;border-radius:10px}
</style>
</head>
<body>
<div id="app"></div>

<div class="overlay" id="sensorOverlay">
  <div class="modal-box" id="sensorBox"></div>
</div>
<div class="overlay" id="lensOverlay">
  <div class="lens-modal" id="lensBox"></div>
</div>

    {label:"XF 80mm f/2.8 Macro",fl:80,minAp:2.8},{label:"XF 100-400mm f/4.5",fl:[100,400],minAp:4.5},
  ],
  leica_m:[
    {label:"Super-Elmar 18mm f/3.8",fl:18,minAp:3.8},{label:"Elmarit 21mm f/2.8",fl:21,minAp:2.8},
    {label:"Summilux 24mm f/1.4",fl:24,minAp:1.4},{label:"Summicron 28mm f/2",fl:28,minAp:2},
    {label:"Summilux 35mm f/1.4",fl:35,minAp:1.4},{label:"Summilux 50mm f/1.4",fl:50,minAp:1.4},
    {label:"Noctilux 50mm f/0.95",fl:50,minAp:.95},{label:"APO-Summicron 75mm f/2",fl:75,minAp:2},
    {label:"Summilux 75mm f/1.25",fl:75,minAp:1.25},{label:"APO-Summicron 90mm f/2",fl:90,minAp:2},
    {label:"APO-Telyt 135mm f/3.4",fl:135,minAp:3.4},
  ],
};
const FSTOPS=[0.95,1,1.2,1.25,1.4,1.8,2,2.8,3.4,3.5,3.8,4,4.5,5,5.6,6.3,7.1,8,11,16,22];

// ── State (plain object, no re-render on every keystroke) ─────
var mode="forward",sensor=SENSORS[0],maker=null,lens=null,zoomFl=null,fstop=null;
var distance=10,distRaw="10";
var revFl=50,revFlRaw="50",revDist=10,revDistRaw="10",revDof=5,revDofRaw="5";

// ── Math ─────────────────────────────────────────────────────
function ftToMm(f){return f*304.8}
function mmToFt(m){return m/304.8}
function fmtFt(f){
  if(!isFinite(f))return"∞";
  if(f>=1000)return(f/1000).toFixed(1)+"k ft";
  if(f>=10)return f.toFixed(1)+" ft";
  return f.toFixed(2)+" ft";
}
function fmtBig(f){
  if(!isFinite(f))return["∞",""];
  if(f>=1000)return[(f/1000).toFixed(2),"k ft"];
  if(f>=10)return[f.toFixed(1),"ft"];
  return[f.toFixed(2),"ft"];
}
function calcDOF(fl,fs,dist,coc){
  var S=ftToMm(dist),H=fl*fl/(fs*coc)+fl;
  var nMm=S*(H-fl)/(H+S-2*fl),fRaw=S*(H-fl)/(H-S);
  var inf=fRaw<=0||!isFinite(fRaw)||S>=H;
  var nFt=mmToFt(nMm),fFt=inf?Infinity:mmToFt(fRaw);
  return{nearFt:nFt,farFt:fFt,totalFt:inf?Infinity:fFt-nFt,hypFt:mmToFt(H),farInf:inf};
}
function calcRev(fl,dist,dof,coc){
  var S=ftToMm(dist),D=ftToMm(dof),ex=D*fl*fl/(2*S*S*coc);
  var sn=FSTOPS.reduce(function(p,c){return Math.abs(c-ex)<Math.abs(p-ex)?c:p});
  return{exact:ex,snapped:sn};
}

function bc(){return maker?maker.brand:"#f5d020"}
function bd(){return maker?maker.dim:"rgba(245,208,32,.12)"}
function fl(){return lens?(Array.isArray(lens.fl)?(zoomFl||lens.fl[0]):lens.fl):null}

// ── Build UI pieces (DOM manipulation, not innerHTML rebuild) ─
function buildHeader(){
  var sn=sensor.id==="ff"?"Full Frame":sensor.id==="mft"?"Micro 4/3":sensor.id==="medium"?"Med Format":sensor.id==="apsc_c"?"APS-C Canon":"APS-C N/S";
  return '<div class="hdr">'+
    '<div class="hdr-left">'+
    '<img class="logo-img" src="data:image/png;base64,'+LOGO+'" alt="NelsonHD">'+
    '<div><div class="hdr-sub">NELSONHD PHOTOGRAPHY</div>'+
    '<div class="hdr-title" style="color:'+bc()+'">DOF CALCULATOR</div></div>'+
    '</div>'+
    '<button class="sensor-btn" onclick="openSensor()">📷 '+sn+'</button>'+
    '</div>';
}

function buildMode(){
  var a='style="background:'+bc()+';border-color:'+bc()+';color:#050508"';
  return '<div class="mode-row">'+
    '<button class="mode-btn" '+(mode==="forward"?a:"")+' onclick="setMode(\'forward\')">▸ DOF from f-stop</button>'+
    '<button class="mode-btn" '+(mode==="reverse"?a:"")+' onclick="setMode(\'reverse\')">◂ f-stop from DOF</button>'+
    '</div>';
}

function buildForward(){
  var lenses=maker?LENSES[maker.id]:[];
  var avail=lens?FSTOPS.filter(function(f){return f>=lens.minAp}):[];
  var isZoom=lens&&Array.isArray(lens.fl);
  var f=fl(),result=(f&&fstop&&distance>0)?calcDOF(f,fstop,distance,sensor.coc):null;
  var brc=bc();

  var html='';

  // Maker
  html+='<div class="sec"><div class="lbl">01 · Manufacturer</div><div class="maker-wrap">';
  MAKERS.forEach(function(m){
    var on=maker&&maker.id===m.id;
    html+='<button class="mkr" style="'+(on?'background:'+m.brand+';border-color:'+m.brand+';color:#050508':'')+'" onclick="selectMaker(\''+m.id+'\')">'+m.label+'</button>';
  });
  html+='</div></div>';

  // Lens
  html+='<div class="sec"><div class="lbl">02 · Lens</div>';
  html+='<button class="lens-btn'+(lens?' sel':'')+'" style="'+(lens?'border-color:'+brc:'')+'" onclick="openLens()">';
  html+='<span>'+(lens?lens.label:(maker?'Tap to choose lens →':'Select manufacturer first'))+'</span>';
  if(maker)html+='<span style="color:#555570;font-size:20px">›</span>';
  html+='</button>';
  if(isZoom){
    html+='<div class="zoom-row">'+
      '<span class="zoom-lbl">'+lens.fl[0]+'mm</span>'+
      '<input type="range" min="'+lens.fl[0]+'" max="'+lens.fl[1]+'" step="1" value="'+(zoomFl||lens.fl[0])+'" '+
      'style="flex:1;background:#222232;accent-color:'+brc+'" oninput="setZoom(this.value)">'+
      '<span class="zoom-val" style="color:'+brc+'">'+(zoomFl||lens.fl[0])+'mm</span>'+
      '</div>';
  }
  html+='</div>';

  // F-Stop
  html+='<div class="sec"><div class="lbl">03 · Aperture</div>';
  if(avail.length){
    html+='<div class="fstop-wrap">';
    avail.forEach(function(f){
      var on=fstop===f;
      html+='<button class="fs'+(on?' on':'')+'" style="'+(on?'background:'+brc+';border-color:'+brc+';color:#050508':'')+'" onclick="setFstop('+f+')">f/'+f+'</button>';
    });
    html+='</div>';
  }else{
    html+='<div style="font-family:monospace;font-size:12px;color:#555570">Select a lens first</div>';
  }
  html+='</div>';

  // Distance
  html+='<div class="sec"><div class="lbl">04 · Distance to Subject</div>'+
    '<div class="dist-row">'+
    '<input type="number" id="distInp" value="'+distRaw+'" placeholder="feet" '+
    'style="background:#141420;border:1px solid #222232;color:#fff;font-size:16px;border-radius:8px;padding:12px 14px;outline:none;flex:1" '+
    'oninput="onDistIn(this.value)" onblur="onDistBl(this.value)" onkeydown="if(event.key===\'Enter\'){onDistBl(this.value);this.blur()}">'+
    '<span class="unit">FEET</span></div>'+
    '<input type="range" min="1" max="300" step="0.5" value="'+Math.min(distance,300)+'" '+
    'style="width:100%;margin-top:12px;accent-color:'+brc+';background:#222232" oninput="onDistSl(this.value)">'+
    '<div class="sldr-labels"><span>1ft</span><span>75</span><span>150</span><span>225</span><span>300ft</span></div>'+
    '</div>';

  // Results
  html+='<div class="results">';
  if(!result){
    html+='<div class="empty"><div style="font-size:36px;margin-bottom:10px;opacity:.2">📷</div>Complete all steps above to calculate</div>';
  }else{
    var big=fmtBig(result.totalFt);
    html+='<div class="main-card" style="border-left-color:'+brc+'">'+
      '<div class="card-lbl">Total Depth of Field</div>'+
      '<div class="big-val">'+big[0]+'<span class="big-unit">'+big[1]+'</span></div>'+
      '<div class="card-sub">'+(result.farInf?'Extends to infinity — past hyperfocal':result.totalFt<2?'⚠ Very shallow — precise focus critical':result.totalFt>50?'Deep zone — broad area in sharp focus':'')+'</div>'+
      '</div>';
    var nb=fmtBig(result.nearFt),fb=fmtBig(result.farFt);
    html+='<div class="mini-grid">'+
      '<div class="mini-card"><div class="card-lbl">Near Limit</div><div class="mini-val">'+nb[0]+'<span class="mini-unit">'+nb[1]+'</span></div></div>'+
      '<div class="mini-card"><div class="card-lbl">Far Limit</div><div class="mini-val">'+(result.farInf?'∞':fb[0])+(result.farInf?'':'<span class="mini-unit">'+fb[1]+'</span>')+'</div></div>'+
      '</div>';
    var bNear=Math.min(result.nearFt/result.hypFt*100,100);
    var bW=result.farInf?100-bNear:Math.min(result.farFt/result.hypFt*100,100)-bNear;
    html+='<div class="bar-lbl">Focus Zone vs Hyperfocal</div>'+
      '<div class="bar-track"><div class="bar-fill" style="left:'+bNear+'%;width:'+Math.max(bW,3)+'%;background:linear-gradient(90deg,#38c8f5,'+brc+')"></div></div>'+
      '<div class="bar-ends"><span>'+fmtFt(result.nearFt)+'</span><span>'+(result.farInf?'∞':fmtFt(result.farFt))+'</span></div>';
    var nearTag=distance>=result.hypFt
      ?'<span class="tag" style="color:#38c8f5;background:rgba(56,200,245,.15);border:1px solid #38c8f5">∞ REACHED</span>'
      :distance>=result.hypFt*.7
      ?'<span class="tag" style="color:'+brc+';background:'+bd()+';border:1px solid '+brc+'">NEAR HYPER</span>':'';
    html+='<div class="hyp-card"><div><div class="hyp-lbl">Hyperfocal Distance</div><div class="hyp-val">'+fmtFt(result.hypFt)+'</div></div>'+nearTag+'</div>';
    html+='<div class="spec">'+f+'mm · f/'+fstop+' · '+distance+'ft · '+sensor.label+' · CoC '+sensor.coc+'mm</div>';
  }
  html+='</div>';
  return html;
}

function buildReverse(){
  var rev=(revFl>0&&revDist>0&&revDof>0)?calcRev(revFl,revDist,revDof,sensor.coc):null;
  var chk=rev?calcDOF(revFl,rev.snapped,revDist,sensor.coc):null;
  var html='<div class="results">';
  html+='<div class="rev-desc">Enter focal length, subject distance, and desired DOF — get the f-stop you need.</div>';

  // Focal length quick picks
  html+='<div style="margin-bottom:14px"><div class="lbl">01 · Focal Length</div>'+
    '<div class="dist-row">'+
    '<input type="number" id="revFlInp" value="'+revFlRaw+'" placeholder="mm" '+
    'style="background:#141420;border:1px solid #222232;color:#fff;font-size:16px;border-radius:8px;padding:12px 14px;outline:none;flex:1" '+
    'oninput="onRFIn(this.value)" onblur="onRFBl(this.value)" onkeydown="if(event.key===\'Enter\'){onRFBl(this.value);this.blur()}">'+
    '<span class="unit">MM</span></div>'+
    '<div class="quick-wrap">';
  [14,16,20,24,28,35,50,85,100,135,200,300,400].forEach(function(f){
    html+='<button class="qk" style="'+(revFl===f?'background:#3ef59a;border-color:#3ef59a;color:#050508':'')+'" onclick="setRF('+f+')">'+f+'</button>';
  });
  html+='</div></div>';

  // Distance with smooth slider (step=0.5)
  html+='<div style="margin-bottom:14px"><div class="lbl">02 · Distance to Subject</div>'+
    '<div class="dist-row">'+
    '<input type="number" id="revDistInp" value="'+revDistRaw+'" placeholder="feet" '+
    'style="background:#141420;border:1px solid #222232;color:#fff;font-size:16px;border-radius:8px;padding:12px 14px;outline:none;flex:1" '+
    'oninput="onRDIn(this.value)" onblur="onRDBl(this.value)" onkeydown="if(event.key===\'Enter\'){onRDBl(this.value);this.blur()}">'+
    '<span class="unit">FEET</span></div>'+
    '<input type="range" min="1" max="300" step="0.5" value="'+Math.min(revDist,300)+'" '+
    'style="width:100%;margin-top:10px;accent-color:#3ef59a;background:#222232" oninput="onRDSl(this.value)">'+
    '</div>';

  // Desired DOF quick picks
  html+='<div style="margin-bottom:20px"><div class="lbl">03 · Desired DOF</div>'+
    '<div class="dist-row">'+
    '<input type="number" id="revDofInp" value="'+revDofRaw+'" placeholder="feet" '+
    'style="background:#141420;border:1px solid #222232;color:#fff;font-size:16px;border-radius:8px;padding:12px 14px;outline:none;flex:1" '+
    'oninput="onROIn(this.value)" onblur="onROBl(this.value)" onkeydown="if(event.key===\'Enter\'){onROBl(this.value);this.blur()}">'+
    '<span class="unit">FEET</span></div>'+
    '<div class="quick-wrap">';
  [1,2,3,5,10,15,20,30,50].forEach(function(d){
    html+='<button class="qk" style="'+(revDof===d?'background:#f5d020;border-color:#f5d020;color:#050508':'')+'" onclick="setRO('+d+')">'+d+'ft</button>';
  });
  html+='</div></div>';
  // Results slot — updated without wiping inputs
  html+='<div id="revResults"></div>';

  if(rev){
    html+='<div class="rev-card"><div class="card-lbl">Recommended Aperture</div>'+
      '<div class="rev-val">f/'+rev.snapped+'</div>'+
      '<div class="card-sub">Exact: f/'+rev.exact.toFixed(2)+' → snapped to nearest standard stop</div></div>';
    if(chk){
      var tb=fmtBig(chk.totalFt),nb=fmtBig(chk.nearFt),fb=fmtBig(chk.farFt);
      html+='<div class="lbl" style="margin-bottom:8px">At f/'+rev.snapped+' you get</div>'+
        '<div class="three-grid">'+
        '<div class="mini-card"><div class="card-lbl">Actual DOF</div><div class="mini-val" style="font-size:22px">'+tb[0]+'<span class="mini-unit">'+tb[1]+'</span></div></div>'+
        '<div class="mini-card"><div class="card-lbl">Near Limit</div><div class="mini-val" style="font-size:22px">'+nb[0]+'<span class="mini-unit">'+nb[1]+'</span></div></div>'+
        '<div class="mini-card"><div class="card-lbl">Far Limit</div><div class="mini-val" style="font-size:22px">'+(chk.farInf?'∞':fb[0])+(chk.farInf?'':'<span class="mini-unit">'+fb[1]+'</span>')+'</div></div>'+
        '</div>';
      html+='<div class="hyp-card"><div><div class="hyp-lbl">Hyperfocal</div><div class="hyp-val">'+fmtFt(chk.hypFt)+'</div></div>'+
        (revDist>=chk.hypFt?'<span class="tag" style="color:#38c8f5;background:rgba(56,200,245,.15);border:1px solid #38c8f5">∞ REACHED</span>':'')+
        '</div>';
      html+='<div class="spec">'+revFl+'mm · f/'+rev.snapped+' · '+revDist+'ft · '+sensor.label+' · CoC '+sensor.coc+'mm</div>';
    }
  }
  html+='</div>';
  return html;
}

function render(){
  var html=buildHeader()+buildMode()+(mode==="forward"?buildForward():buildReverse());
  document.getElementById("app").innerHTML=html;
}

// Sensor modal (separate DOM, not re-rendered with main)
function openSensor(){
  var brc=bc(),html='<div class="modal-title" style="color:'+brc+'">Sensor Size</div><div class="sens-grid">';
  SENSORS.forEach(function(s){
    var on=sensor.id===s.id;
    html+='<div class="sens-opt'+(on?' on':'')+'" onclick="selSensor(\''+s.id+'\')">'+
      '<div class="sens-name">'+s.label+'</div>'+
      '<div class="sens-sub">'+s.sub+' · '+s.coc+'mm</div></div>';
  });
  html+='</div><button class="done-btn" style="background:'+brc+'" onclick="closeSensor()">Done</button>';
  document.getElementById("sensorBox").innerHTML=html;
  document.getElementById("sensorOverlay").classList.add("open");
}
function closeSensor(){document.getElementById("sensorOverlay").classList.remove("open")}
function selSensor(id){sensor=SENSORS.find(function(s){return s.id===id});closeSensor();render()}

// Lens modal
function openLens(){
  if(!maker)return;
  var lenses=LENSES[maker.id],brc=bc(),bd2=bd();
  var html='<div class="lens-hdr"><h2 style="color:'+brc+'">'+maker.label+' Lenses</h2><p>'+lenses.length+' lenses · tap to select</p></div>'+
    '<div class="lens-list">';
  lenses.forEach(function(l,i){
    var on=lens&&lens.label===l.label;
    var fl2=Array.isArray(l.fl)?l.fl[0]+'-'+l.fl[1]+'mm zoom':l.fl+'mm prime';
    html+='<button class="lens-item'+(on?' on':'')+'" style="'+(on?'color:'+brc+';border-color:'+brc+';background:'+bd2:'')+'" onclick="selLens('+i+')">'+
      '<div class="li-name">'+l.label+'</div>'+
      '<div class="li-sub">'+fl2+' · f/'+l.minAp+' min</div></button>';
  });
  html+='</div><div class="lens-ftr"><button class="cancel-btn" onclick="closeLens()">Cancel</button></div>';
  document.getElementById("lensBox").innerHTML=html;
  document.getElementById("lensOverlay").classList.add("open");
}
function closeLens(){document.getElementById("lensOverlay").classList.remove("open")}
function selLens(i){
  lens=LENSES[maker.id][i];fstop=null;
  zoomFl=Array.isArray(lens.fl)?lens.fl[0]:null;
  closeLens();render();
}

// ── Event handlers (targeted DOM updates where possible) ──────
function setMode(m){mode=m;render()}
function selectMaker(id){maker=MAKERS.find(function(m){return m.id===id});lens=null;fstop=null;zoomFl=null;render()}
function setZoom(v){zoomFl=parseInt(v);render()}

function setFstop(f){
  fstop=f;
  // Just update button styles + results, not full re-render
  document.querySelectorAll(".fs").forEach(function(b){
    var bf=parseFloat(b.textContent.replace("f/",""));
    if(bf===f){b.className="fs on";b.style.background=bc();b.style.borderColor=bc();b.style.color="#050508"}
    else{b.className="fs";b.style.background="";b.style.borderColor="";b.style.color=""}
  });
  updateResults();
}

function updateResults(){
  var f=fl(),res=(f&&fstop&&distance>0)?calcDOF(f,fstop,distance,sensor.coc):null;
  var brc=bc(),el=document.querySelector(".results");
  if(!el)return;
  if(!res){el.innerHTML='<div class="empty"><div style="font-size:36px;margin-bottom:10px;opacity:.2">📷</div>Complete all steps above to calculate</div>';return}
  var big=fmtBig(res.totalFt),nb=fmtBig(res.nearFt),fb=fmtBig(res.farFt);
  var bNear=Math.min(res.nearFt/res.hypFt*100,100);
  var bW=res.farInf?100-bNear:Math.min(res.farFt/res.hypFt*100,100)-bNear;
  var nearTag=distance>=res.hypFt
    ?'<span class="tag" style="color:#38c8f5;background:rgba(56,200,245,.15);border:1px solid #38c8f5">∞ REACHED</span>'
    :distance>=res.hypFt*.7
    ?'<span class="tag" style="color:'+brc+';background:'+bd()+';border:1px solid '+brc+'">NEAR HYPER</span>':'';
  el.innerHTML=
    '<div class="main-card" style="border-left-color:'+brc+'">'+
    '<div class="card-lbl">Total Depth of Field</div>'+
    '<div class="big-val">'+big[0]+'<span class="big-unit">'+big[1]+'</span></div>'+
    '<div class="card-sub">'+(res.farInf?'Extends to infinity — past hyperfocal':res.totalFt<2?'⚠ Very shallow':res.totalFt>50?'Deep zone — broad area in sharp focus':'')+'</div></div>'+
    '<div class="mini-grid">'+
    '<div class="mini-card"><div class="card-lbl">Near Limit</div><div class="mini-val">'+nb[0]+'<span class="mini-unit">'+nb[1]+'</span></div></div>'+
    '<div class="mini-card"><div class="card-lbl">Far Limit</div><div class="mini-val">'+(res.farInf?'∞':fb[0])+(res.farInf?'':'<span class="mini-unit">'+fb[1]+'</span>')+'</div></div>'+
    '</div>'+
    '<div class="bar-lbl">Focus Zone vs Hyperfocal</div>'+
    '<div class="bar-track"><div class="bar-fill" style="left:'+bNear+'%;width:'+Math.max(bW,3)+'%;background:linear-gradient(90deg,#38c8f5,'+brc+')"></div></div>'+
    '<div class="bar-ends"><span>'+fmtFt(res.nearFt)+'</span><span>'+(res.farInf?'∞':fmtFt(res.farFt))+'</span></div>'+
    '<div class="hyp-card"><div><div class="hyp-lbl">Hyperfocal Distance</div><div class="hyp-val">'+fmtFt(res.hypFt)+'</div></div>'+nearTag+'</div>'+
    '<div class="spec">'+f+'mm · f/'+fstop+' · '+distance+'ft · '+sensor.label+' · CoC '+sensor.coc+'mm</div>';
}

// Distance — only update results, don't re-render whole page
function onDistIn(v){distRaw=v;var n=parseFloat(v);if(!isNaN(n)&&n>0){distance=n;updateResults()}}
function onDistBl(v){var n=Math.max(1,parseFloat(v)||1);distance=n;distRaw=String(n);updateResults()}
function onDistSl(v){distance=parseInt(v);distRaw=String(distance);var inp=document.getElementById("distInp");if(inp)inp.value=distRaw;updateResults()}

// Reverse handlers
function setRF(f){revFl=f;revFlRaw=String(f);render()}
function onRFIn(v){revFlRaw=v;var n=parseFloat(v);if(!isNaN(n)&&n>0){revFl=n;updateRevResults()}}
function onRFBl(v){var n=Math.max(1,parseFloat(v)||1);revFl=n;revFlRaw=String(n);updateRevResults()}
function setRD(v){revDist=parseInt(v);revDistRaw=String(revDist);updateRevResults()}
function onRDIn(v){revDistRaw=v;var n=parseFloat(v);if(!isNaN(n)&&n>0){revDist=n;updateRevResults()}}
function onRDBl(v){var n=Math.max(1,parseFloat(v)||1);revDist=n;revDistRaw=String(n);updateRevResults()}
function onRDSl(v){revDist=parseInt(v);revDistRaw=String(revDist);updateRevResults()}
function setRO(d){revDof=d;revDofRaw=String(d);render()}
function onROIn(v){revDofRaw=v;var n=parseFloat(v);if(!isNaN(n)&&n>0){revDof=n;updateRevResults()}}
function onROBl(v){var n=Math.max(.1,parseFloat(v)||.1);revDof=n;revDofRaw=String(n);updateRevResults()}

function updateRevResults(){
  var rev=(revFl>0&&revDist>0&&revDof>0)?calcRev(revFl,revDist,revDof,sensor.coc):null;
  var chk=rev?calcDOF(revFl,rev.snapped,revDist,sensor.coc):null;
  var el=document.getElementById("revResults");
  if(!el)return;
  if(!rev){el.innerHTML='';return}
  var tb=fmtBig(chk.totalFt),nb=fmtBig(chk.nearFt),fb=fmtBig(chk.farFt);
  el.innerHTML=
    '<div class="rev-card"><div class="card-lbl">Recommended Aperture</div>'+
    '<div class="rev-val">f/'+rev.snapped+'</div>'+
    '<div class="card-sub">Exact: f/'+rev.exact.toFixed(2)+' → snapped to nearest standard stop</div></div>'+
    '<div class="lbl" style="margin-bottom:8px">At f/'+rev.snapped+' you get</div>'+
    '<div class="three-grid">'+
    '<div class="mini-card"><div class="card-lbl">Actual DOF</div><div class="mini-val" style="font-size:22px">'+tb[0]+'<span class="mini-unit">'+tb[1]+'</span></div></div>'+
    '<div class="mini-card"><div class="card-lbl">Near Limit</div><div class="mini-val" style="font-size:22px">'+nb[0]+'<span class="mini-unit">'+nb[1]+'</span></div></div>'+
    '<div class="mini-card"><div class="card-lbl">Far Limit</div><div class="mini-val" style="font-size:22px">'+(chk.farInf?'∞':fb[0])+(chk.farInf?'':'<span class="mini-unit">'+fb[1]+'</span>')+'</div></div>'+
    '</div>'+
    '<div class="hyp-card"><div><div class="hyp-lbl">Hyperfocal</div><div class="hyp-val">'+fmtFt(chk.hypFt)+'</div></div>'+
    (revDist>=chk.hypFt?'<span class="tag" style="color:#38c8f5;background:rgba(56,200,245,.15);border:1px solid #38c8f5">∞ REACHED</span>':'')+
    '</div>'+
    '<div class="spec">'+revFl+'mm · f/'+rev.snapped+' · '+revDist+'ft · '+sensor.label+' · CoC '+sensor.coc+'mm</div>';
}

// Close modals on overlay tap
document.getElementById("sensorOverlay").addEventListener("click",function(e){if(e.target===this)closeSensor()});
document.getElementById("lensOverlay").addEventListener("click",function(e){if(e.target===this)closeLens()});

render();
</script>
</body>
</html>
